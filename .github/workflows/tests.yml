# Test gate — run the repo's pytest suite on every PR.
#
# The green/red merge signal: `uv run --with pytest pytest tests/`. Dependency-free (uv only,
# no secrets, no committed lockfile required). This is the check `gh ship` and the branch
# ruleset wait on — a repo without it has nothing to gate merges on.
#
# INSTALL: copy to .github/workflows/tests.yml (rig does this from ci.items.tests).
#
# KNOBS: TEST_PATHS (default `tests`) and TEST_EXTRA_DEPS (extra `--with` deps) below.
#
# Runs the PR's own code, so it uses `pull_request` (NOT pull_request_target) — the
# restricted, read-only, secretless context. Pin actions to commit SHAs.

name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded PR runs, but never cancel a main-baseline run mid-flight (a half-run
# baseline on a protected branch is worse than a redundant one).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover both the requires-python floor (3.9 — the very reason the version
        # resolver hand-parses pyproject instead of using tomllib) and a current line.
        python-version: ["3.9", "3.12"]
    env:
      TEST_PATHS: tests
      TEST_EXTRA_DEPS: ""
      # Pin the test runner so a new pytest major can't flip a green PR red on its own; bump
      # deliberately. Override PYTEST_SPEC to track a different line.
      PYTEST_SPEC: "pytest>=8,<9"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run pytest
        run: |
          set -euo pipefail
          if [ ! -d tests ] && [ "${TEST_PATHS}" = "tests" ]; then
            echo "::error::no tests/ directory found — set TEST_PATHS or add tests."
            exit 1
          fi
          extra=""
          for dep in ${TEST_EXTRA_DEPS}; do extra="${extra} --with ${dep}"; done
          # --no-project: run against the source checkout WITHOUT building/installing
          # draw-cli as a dist, so the tests exercise the same symlink/pyproject-fallback
          # path the tool uses in a real checkout (and don't need the heavy hf/Pillow deps).
          # shellcheck disable=SC2086
          uv run --no-project --python "${{ matrix.python-version }}" \
            --with "${PYTEST_SPEC}" ${extra} pytest ${TEST_PATHS} -q
